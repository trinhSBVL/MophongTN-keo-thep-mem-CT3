<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Thí Nghiệm Kéo Thép CT3 </title>
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #2563eb; --danger: #dc2626;
            --bg-light: #f8fafc; --border: #cbd5e1; --text-main: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0; margin: 0; padding: 2vh 2vw;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        h1 { color: var(--primary); margin: 0 0 5px 0; font-size: 1.8vw; text-transform: uppercase; text-align: center; }
        p.subtitle { color: #475569; margin: 0 0 10px 0; font-style: italic; font-size: 1vw;}

        /* Bố cục 16:9 chuẩn */
        .layout-wrapper {
            display: flex; width: 100%; max-width: 1600px;
            aspect-ratio: 16 / 9; /* Ép tỷ lệ 16:9 */
            background: #fff; border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            overflow: hidden; border: 1px solid var(--border);
        }

        /* KHUNG BÊN TRÁI: 1/3 */
        .panel-left {
            flex: 1; /* Chiếm 1 phần */
            border-right: 2px solid var(--border);
            background: var(--bg-light); padding: 1.5%;
            display: flex; flex-direction: column; position: relative;
        }

        /* KHUNG BÊN PHẢI: 2/3 */
        .panel-right {
            flex: 2; /* Chiếm 2 phần */
            padding: 1.5%; display: flex; flex-direction: column; position: relative;
        }

        h2 { font-size: 1.1vw; color: var(--primary); text-align: center; margin: 0 0 10px 0; border-bottom: 2px solid var(--secondary); padding-bottom: 5px; text-transform: uppercase;}

        .canvas-container { flex: 1; position: relative; width: 100%; }
        
        canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; border: 1px solid var(--border); border-radius: 6px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.03);
        }

        /* Hộp Thông Tin Mẫu (Trái) */
        .info-box {
            background: #ffffff; border: 2px solid var(--secondary);
            border-radius: 6px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10;
        }
        .info-header { background: var(--secondary); color: #fff; padding: 5px; text-align: center; font-weight: bold; font-size: 0.9vw; }
        .info-body { padding: 8px; display: flex; gap: 10px;}
        .input-group { flex: 1; font-size: 0.85vw; font-weight: bold; color: var(--text-main); }
        .input-group input {
            width: 100%; padding: 4px; margin-top: 4px; border: 1px solid #94a3b8;
            border-radius: 4px; font-weight: bold; color: var(--danger); box-sizing: border-box; text-align: center; font-size: 0.9vw;
        }

        /* Vùng điều khiển dưới cùng */
        .control-area {
            width: 100%; max-width: 1600px; background: #fff; padding: 15px;
            margin-top: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); box-sizing: border-box; text-align: center;
        }
        input[type="range"] { width: 95%; height: 8px; border-radius: 4px; outline: none; cursor: pointer; accent-color: var(--secondary); }
        
        .dashboard {
            display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px;
            background: #eff6ff; padding: 10px; border-radius: 8px;
            font-size: 1vw; font-weight: bold; border: 1px solid #bfdbfe; margin-top: 15px;
        }
        .dashboard span { color: var(--primary); }
        .dashboard span.highlight { color: var(--danger); }
        .dashboard span.safe { color: #15803d; }
    </style>
</head>
<body>

    <h1>THÍ NGHIỆM KÉO THÉP MỀM CT3</h1>
    <p class="subtitle">ỨNG XỬ CỦA VẬT LIỆU KHI CHỊU KÉO</p>

    <div class="layout-wrapper">
        <!-- BÊN TRÁI: 1/3 (Mẫu vật, Thông tin, Thước đo) -->
        <div class="panel-left">
            <h2>ỨNG XỬ CỦA MẪU</h2>
            <div class="info-box">
                <div class="info-header">THÔNG TIN MẪU THỬ CT3</div>
                <div class="info-body">
                    <div class="input-group">
                        Đường kính d₀ (mm):
                        <input type="number" id="inpD0" min="9" max="11" step="0.05" value="10.00">
                    </div>
                    <div class="input-group">
                        Chiều dài L₀ (mm):
                        <input type="number" id="inpL0" min="100" max="120" step="0.1" value="100.0">
                    </div>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="canvasSpecimen"></canvas>
            </div>
        </div>

        <!-- BÊN PHẢI: 2/3 (Biểu đồ) -->
        <div class="panel-right">
            <h2>BIỂU ĐỒ LỰC KÉO (N) - BIẾN DẠNG (mm)</h2>
            <div class="canvas-container">
                <canvas id="canvasGraph"></canvas>
            </div>
        </div>
    </div>

    <!-- KHU VỰC ĐIỀU KHIỂN CHUNG -->
    <div class="control-area">
        <label style="font-weight:bold; font-size:1.1vw; color:var(--text-main);">KÉO THANH TRƯỢT ĐỂ TĂNG BIẾN DẠNG (ΔL)</label><br><br>
        <input type="range" id="sliderDL" min="0" max="30" value="0" step="0.01">
        
        <div class="dashboard">
            <span>Độ giãn ΔL: <span id="valDL">0.00</span> mm</span>
            <span class="highlight">Lực kéo P: <span id="valP">0</span> N</span>
            <span class="safe">Biến dạng ε: <span id="valStrain">0.00</span> %</span>
            <span class="safe">Ứng suất σ: <span id="valStress">0.00</span> MPa</span>
        </div>
    </div>

    <script>
        // Lấy Element
        const inpD0 = document.getElementById('inpD0');
        const inpL0 = document.getElementById('inpL0');
        const sliderDL = document.getElementById('sliderDL');
        
        const ctxS = document.getElementById('canvasSpecimen').getContext('2d');
        const ctxG = document.getElementById('canvasGraph').getContext('2d');

        let kF = 1.0, kL = 1.0, limit = {};

        // Đảm bảo độ nét của canvas
        function resizeCanvases() {
            const wrapS = ctxS.canvas.parentElement;
            ctxS.canvas.width = wrapS.clientWidth * 2; // Tăng pixel density
            ctxS.canvas.height = wrapS.clientHeight * 2;
            
            const wrapG = ctxG.canvas.parentElement;
            ctxG.canvas.width = wrapG.clientWidth * 2;
            ctxG.canvas.height = wrapG.clientHeight * 2;
        }

        // TÍNH TOÁN QUY ĐỔI TỶ LỆ DỰA VÀO D0, L0
        function updateScaling() {
            let d0 = parseFloat(inpD0.value) || 10;
            let L0 = parseFloat(inpL0.value) || 100;
            
            if (d0 < 9) d0 = 9; if (d0 > 11) d0 = 11;
            if (L0 < 100) L0 = 100; if (L0 > 120) L0 = 120;

            // Hệ số tỷ lệ Lực theo tiết diện
            kF = Math.pow(d0 / 10.0, 2);
            // Hệ số tỷ lệ Biến dạng theo chiều dài ban đầu
            kL = L0 / 100.0;

            limit = {
                L_elas: 0.16 * kL,   // Hết đàn hồi
                L_yield: 4.0 * kL,   // Hết chảy
                L_hard: 20.0 * kL,   // Củng cố max
                L_frac: 25.0 * kL,   // Đứt
                
                F_elas: 25000 * kF,
                F_yield_base: 25600 * kF,
                F_yield_amp: 300 * kF,
                F_max: 38000 * kF,
                F_frac: 26200 * kF
            };

            sliderDL.max = limit.L_frac + (1.5 * kL);
        }

        // HÀM TÍNH LỰC THEO BIẾN DẠNG
        function getForce(dL) {
            if (dL <= 0) return 0;
            if (dL <= limit.L_elas) return (limit.F_elas / limit.L_elas) * dL; // Đàn hồi
            else if (dL <= limit.L_yield) {
                // Chảy dẻo
                let freq = (6 * 2 * Math.PI) / (limit.L_yield - limit.L_elas);
                return limit.F_yield_base + limit.F_yield_amp * Math.sin(freq * (dL - limit.L_elas));
            }
            else if (dL <= limit.L_hard) {
                // Củng cố
                let t = (dL - limit.L_yield) / (limit.L_hard - limit.L_yield);
                return limit.F_yield_base + (limit.F_max - limit.F_yield_base) * Math.sin(t * Math.PI / 2);
            }
            else if (dL <= limit.L_frac) {
                // Phá hủy
                let t = (dL - limit.L_hard) / (limit.L_frac - limit.L_hard);
                return limit.F_max - (limit.F_max - limit.F_frac) * (t * t);
            }
            return 0; // Đứt
        }

        // Lấy Chú thích cho từng giai đoạn
        function getPhaseNote(dL) {
            if (dL == 0) return { title: "TRẠNG THÁI NGHỈ", text: "Chưa gia tải.", color: "#475569", bg: "#f1f5f9" };
            if (dL <= limit.L_elas) return { 
                title: "GIAI ĐOẠN ĐÀN HỒI", 
                text: "P tỉ lệ với ΔL. ĐL Hooke (σ = E.ε).", 
                color: "#15803d", bg: "#dcfce7" 
            };
            if (dL <= limit.L_yield) return { 
                title: "GIAI ĐOẠN CHẢY DẺO", 
                text: "P không đổi nhưng mẫu vẫn tiếp tục bị giãn dài.", 
                color: "#b45309", bg: "#fef3c7" 
            };
            if (dL <= limit.L_hard) return { 
                title: "GIAI ĐOẠN CỦNG CỐ", 
                text: "Lực tăng ít, biến dạng nhiều. Vật liệu tự biến cứng.", 
                color: "#c2410c", bg: "#ffedd5" 
            };
            if (dL <= limit.L_frac) return { 
                title: "GIAI ĐOẠN PHÁ HỦY", 
                text: "Lực giảm. Xuất hiện vị trí co thắt và các vết xiên 45 độ.", 
                color: "#b91c1c", bg: "#fee2e2" 
            };
            return { 
                title: "ĐÃ PHÁ HỦY", 
                text: "Mẫu đứt gãy hình miệng chén (lõm 45 độ) và nón (lồi 45 độ).", 
                color: "#7f1d1d", bg: "#fecaca" 
            };
        }

        // VẼ BIỂU ĐỒ BÊN PHẢI (2/3)
        function drawGraph(currDL) {
            let W = ctxG.canvas.width; let H = ctxG.canvas.height;
            ctxG.clearRect(0, 0, W, H);

            const padL = 120, padB = 100, padT = 80, padR = 60;
            const originX = padL, originY = H - padB;
            const maxX = 30 * kL; const maxY = 42000 * kF; 
            const sX = (W - padL - padR) / maxX;
            const sY = (H - padT - padB) / maxY;

            // 1. Vẽ lưới (Grid)
            ctxG.strokeStyle = "#e2e8f0"; ctxG.lineWidth = 2; ctxG.font = "20px Tahoma"; ctxG.fillStyle = "#64748b";
            for (let i = 0; i <= Math.ceil(maxX); i += 5) {
                let px = originX + i * sX;
                ctxG.beginPath(); ctxG.moveTo(px, originY); ctxG.lineTo(px, padT); ctxG.stroke();
                ctxG.fillText(i, px - 10, originY + 30);
            }
            for (let i = 0; i <= maxY; i += 5000) {
                let py = originY - i * sY;
                ctxG.beginPath(); ctxG.moveTo(originX, py); ctxG.lineTo(W - padR, py); ctxG.stroke();
                ctxG.fillText(i, originX - 80, py + 8);
            }

            // 2. Hai trục chính
            ctxG.strokeStyle = "#0f172a"; ctxG.lineWidth = 4;
            ctxG.beginPath(); ctxG.moveTo(originX, padT - 20); ctxG.lineTo(originX, originY); ctxG.lineTo(W - padR + 20, originY); ctxG.stroke();

            // Label trục
            ctxG.font = "bold 22px Tahoma"; ctxG.fillStyle = "#1e3a8a";
            ctxG.fillText("Biến dạng ΔL (mm)", W - padR - 200, originY - 20);
            ctxG.save(); ctxG.translate(originX - 90, padT + 180); ctxG.rotate(-Math.PI/2);
            ctxG.fillText("Lực kéo P (N)", 0, 0); ctxG.restore();

            // 3. Vẽ hộp Chú Thích (Annotation Box) trên đồ thị
            let note = getPhaseNote(currDL);
            let boxW = 1000, boxH = 200;
            let boxX = originX + 100, boxY = padT + 40;
            
            ctxG.fillStyle = note.bg; ctxG.strokeStyle = note.color; ctxG.lineWidth = 2;
            ctxG.beginPath(); ctxG.roundRect(boxX, boxY, boxW, boxH, 8); ctxG.fill(); ctxG.stroke();
            
            ctxG.fillStyle = note.color; ctxG.font = "bold 22px Arial";
            ctxG.fillText(note.title, boxX + 20, boxY + 35);
            ctxG.font = "18px Arial";
            ctxG.fillStyle = "#1e293b";
            ctxG.fillText(note.text, boxX + 20, boxY + 70);

            // 4. Vẽ đường cong
            if (currDL > 0) {
                let drawLimit = Math.min(currDL, limit.L_frac);
                ctxG.beginPath(); ctxG.moveTo(originX, originY);
                
                for (let x = 0; x <= drawLimit; x += 0.05) {
                    let y = getForce(x);
                    let px = originX + x * sX, py = originY - y * sY;
                    
                    if (x <= limit.L_elas) ctxG.strokeStyle = "#16a34a";
                    else if (x <= limit.L_yield) ctxG.strokeStyle = "#d97706";
                    else if (x <= limit.L_hard) ctxG.strokeStyle = "#ea580c";
                    else ctxG.strokeStyle = "#dc2626";

                    ctxG.lineTo(px, py); ctxG.lineWidth = 4; ctxG.stroke();
                    ctxG.beginPath(); ctxG.moveTo(px, py);
                }

                // Điểm theo dõi hoặc Đứt
                if (currDL <= limit.L_frac) {
                    let py = originY - getForce(currDL) * sY;
                    ctxG.beginPath(); ctxG.arc(originX + currDL * sX, py, 10, 0, 2*Math.PI);
                    ctxG.fillStyle = "#dc2626"; ctxG.fill(); ctxG.strokeStyle = "#fff"; ctxG.lineWidth = 3; ctxG.stroke();
                } else {
                    let py = originY - limit.F_frac * sY;
                    ctxG.fillStyle = "#dc2626"; ctxG.font = "bold 30px Arial";
                    ctxG.fillText("✖", originX + limit.L_frac * sX + 15, py + 10);
                }
            }
        }

        // VẼ MẪU, LỰC, THƯỚC (BÊN TRÁI - 1/3)
        function drawSpecimen(dL, force) {
            let W = ctxS.canvas.width; let H = ctxS.canvas.height;
            ctxS.clearRect(0, 0, W, H);

            let d0 = parseFloat(inpD0.value) || 10; let L0 = parseFloat(inpL0.value) || 100;

            const visScale = H / 400; // Tỷ lệ phóng động theo chiều cao Canvas
            const cX = W / 2 - 50;    // Trọng tâm mẫu (Lệch trái để nhường chỗ cho thước)
            const visD = d0 * visScale * 2.5; // Bề rộng mẫu
            const visL0 = L0 * visScale; 
            const visDL = dL * visScale; 

            // Căn giữa theo chiều dọc
            const topY = 100;
            const botY = topY + visL0 + visDL;
            const gripW = 180, gripH = 40;

            // 1. VẼ THƯỚC ĐO BÊN CẠNH
            const rulerX = cX + visD/2 + 70;
            const maxMeasure = 130; 
            
            ctxS.strokeStyle = "#64748b"; ctxS.lineWidth = 3;
            ctxS.beginPath(); ctxS.moveTo(rulerX, topY); ctxS.lineTo(rulerX, topY + maxMeasure * visScale); ctxS.stroke();

            ctxS.fillStyle = "#475569"; ctxS.font = "18px Arial";
            for(let i = 0; i <= maxMeasure; i += 5) {
                let yTick = topY + i * visScale;
                ctxS.beginPath(); ctxS.moveTo(rulerX, yTick);
                if (i % 10 === 0) {
                    ctxS.lineTo(rulerX + 20, yTick);
                    ctxS.fillText(i, rulerX + 30, yTick + 6);
                } else {
                    ctxS.lineTo(rulerX + 10, yTick);
                }
                ctxS.stroke();
            }

            // Kim chỉ thị màu đỏ
            ctxS.beginPath(); ctxS.moveTo(cX + visD/2 + 10, botY); ctxS.lineTo(rulerX, botY);
            ctxS.strokeStyle = "#dc2626"; ctxS.lineWidth = 2.5; ctxS.setLineDash([8, 8]); ctxS.stroke(); ctxS.setLineDash([]);
            
            ctxS.beginPath(); ctxS.moveTo(rulerX, botY); ctxS.lineTo(rulerX - 10, botY - 8); ctxS.lineTo(rulerX - 10, botY + 8);
            ctxS.fillStyle = "#dc2626"; ctxS.fill();
            
            ctxS.fillStyle = "#dc2626"; ctxS.font = "bold 22px Arial";
            ctxS.fillText(`ΔL = ${dL.toFixed(2)}`, rulerX + 65, botY + 8);

            // 2. VẼ MŨI TÊN LỰC P VÀ CHỈ THỊ
            const drawP = (yPos, isTop) => {
                if (force <= 0) return;
                let sign = isTop ? -1 : 1;
                let arrowLen = 50 + (force / limit.F_max) * 60; 
                
                ctxS.beginPath(); ctxS.moveTo(cX, yPos); ctxS.lineTo(cX, yPos + arrowLen*sign);
                ctxS.strokeStyle = "#dc2626"; ctxS.lineWidth = 4 + (force/20000); ctxS.stroke();
                
                ctxS.beginPath(); ctxS.moveTo(cX, yPos + arrowLen*sign);
                ctxS.lineTo(cX - 12, yPos + (arrowLen - 16)*sign); ctxS.lineTo(cX + 12, yPos + (arrowLen - 16)*sign);
                ctxS.fillStyle = "#dc2626"; ctxS.fill();

                ctxS.fillStyle = "#991b1b"; ctxS.font = "bold 26px Arial";
                ctxS.fillText("P", cX - 40, yPos + (arrowLen/2)*sign + 10);

                let boxX = cX - 220; let boxY = yPos + (arrowLen/2)*sign - 20;
                ctxS.fillStyle = "#fef2f2"; ctxS.strokeStyle = "#ef4444"; ctxS.lineWidth = 2;
                ctxS.beginPath(); ctxS.roundRect(boxX, boxY, 140, 40, 6); ctxS.fill(); ctxS.stroke();
                ctxS.fillStyle = "#b91c1c"; ctxS.font = "bold 20px Arial";
                ctxS.fillText(`${Math.round(force)} N`, boxX + 15, boxY + 28);
            };

            if (dL <= limit.L_frac) {
                drawP(topY - gripH, true); drawP(botY + gripH, false); 
            }

            // 3. VẼ NGÀM KẸP
            ctxS.fillStyle = "#334155";
            ctxS.fillRect(cX - gripW/2, topY - gripH, gripW, gripH); 
            ctxS.fillRect(cX - gripW/2, botY, gripW, gripH); 

            // 4. VẼ THÂN MẪU & HIỆN TƯỢNG VẬT LÝ
            let neck = 0;
            if (dL > limit.L_hard && dL <= limit.L_frac) neck = (dL - limit.L_hard) * 3; 
            else if (dL > limit.L_frac) neck = (limit.L_frac - limit.L_hard) * 3; 

            let neckW = visD - 2 * neck; // Bề rộng cổ
            let cupDepth = neckW / 2;    // Đảm bảo góc nghiêng 45 độ

            let currVisL = visL0 + visDL;
            let breakY = topY + currVisL/2; // Vị trí chính giữa

            ctxS.fillStyle = "#cbd5e1"; ctxS.strokeStyle = "#0f172a"; ctxS.lineWidth = 3;

            if (dL <= limit.L_frac) {
                // MẪU CHƯA ĐỨT
                ctxS.save();
                ctxS.beginPath();
                ctxS.moveTo(cX - visD/2, topY);
                ctxS.quadraticCurveTo(cX - visD/2 + neck, breakY, cX - visD/2 + neck, breakY);
                ctxS.quadraticCurveTo(cX - visD/2 + neck, breakY, cX - visD/2, botY);
                ctxS.lineTo(cX + visD/2, botY);
                ctxS.quadraticCurveTo(cX + visD/2 - neck, breakY, cX + visD/2 - neck, breakY);
                ctxS.quadraticCurveTo(cX + visD/2 - neck, breakY, cX + visD/2, topY);
                ctxS.closePath(); 
                ctxS.fill(); ctxS.stroke();
                
                // Vết xiên 45 độ (Slip Lines) khi thắt eo
                if (dL > limit.L_hard) {
                    ctxS.clip(); // Giới hạn chỉ vẽ trong thân thép
                    ctxS.beginPath(); ctxS.strokeStyle = "rgba(15, 23, 42, 0.3)"; ctxS.lineWidth = 2;
                    let range = visD * 1.5;
                    for(let i = -range; i <= range; i+=12) {
                        ctxS.moveTo(cX - range, breakY + i - range); ctxS.lineTo(cX + range, breakY + i + range); // Vết \
                        ctxS.moveTo(cX + range, breakY + i - range); ctxS.lineTo(cX - range, breakY + i + range); // Vết /
                    }
                    ctxS.stroke();
                }
                ctxS.restore();

            } else {
                // MẪU ĐÃ ĐỨT (CUP AND CONE FRACTURE 45 ĐỘ)
                let gap = 30; // Khoảng cách đứt

                // NỬA TRÊN: CHÉN (CUP) - Lõm lên
                ctxS.beginPath(); 
                ctxS.moveTo(cX - visD/2, topY);
                ctxS.quadraticCurveTo(cX - visD/2 + neck, breakY - gap, cX - neckW/2, breakY - gap);
                ctxS.lineTo(cX, breakY - gap - cupDepth); // Góc lõm 45 độ
                ctxS.lineTo(cX + neckW/2, breakY - gap);
                ctxS.quadraticCurveTo(cX + visD/2 - neck, breakY - gap, cX + visD/2, topY);
                ctxS.fill(); ctxS.stroke();

                // NỬA DƯỚI: NÓN (CONE) - Lồi lên
                ctxS.beginPath(); 
                ctxS.moveTo(cX - visD/2, botY);
                ctxS.quadraticCurveTo(cX - visD/2 + neck, breakY + gap, cX - neckW/2, breakY + gap);
                ctxS.lineTo(cX, breakY + gap - cupDepth); // Góc lồi 45 độ (Khớp với chén)
                ctxS.lineTo(cX + neckW/2, breakY + gap);
                ctxS.quadraticCurveTo(cX + visD/2 - neck, breakY + gap, cX + visD/2, botY);
                ctxS.fill(); ctxS.stroke();
            }
        }

        // QUẢN LÝ DÒNG CHẢY MÔ PHỎNG
        function runSimulation() {
            resizeCanvases(); 
            updateScaling();
            
            let dL = parseFloat(sliderDL.value);
            let force = getForce(dL);
            
            let d0 = parseFloat(inpD0.value) || 10; let L0 = parseFloat(inpL0.value) || 100;
            let stress = force / ((Math.PI * Math.pow(d0, 2)) / 4.0);
            let strain = (dL / L0) * 100;

            document.getElementById('valDL').innerText = dL.toFixed(2);
            document.getElementById('valStrain').innerText = strain.toFixed(2);
            
            if (dL > limit.L_frac) {
                document.getElementById('valP').innerText = "0";
                document.getElementById('valStress').innerText = "0.00";
            } else {
                document.getElementById('valP').innerText = Math.round(force);
                document.getElementById('valStress').innerText = stress.toFixed(2);
            }

            drawGraph(dL); drawSpecimen(dL, force);
        }

        // Khởi tạo
        window.addEventListener('resize', runSimulation); 
        sliderDL.addEventListener('input', runSimulation);
        inpD0.addEventListener('input', () => { updateScaling(); if(parseFloat(sliderDL.value) > parseFloat(sliderDL.max)) sliderDL.value = sliderDL.max; runSimulation(); });
        inpL0.addEventListener('input', () => { updateScaling(); if(parseFloat(sliderDL.value) > parseFloat(sliderDL.max)) sliderDL.value = sliderDL.max; runSimulation(); });

        // Delay nhẹ để đảm bảo CSS load xong kích thước
        setTimeout(runSimulation, 100);
    </script>
</body>
</html>
